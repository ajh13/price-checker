<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; font-weight: 500; }

    textarea, input[type="text"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #6366f1;
    }

    .row { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .row > div { flex: 1; min-width: 200px; }

    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
    .checkbox-row input { width: 16px; height: 16px; accent-color: #6366f1; cursor: pointer; }
    .checkbox-row label { margin: 0; cursor: pointer; color: #94a3b8; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 1rem;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status { font-size: 0.85rem; color: #64748b; margin-top: 0.75rem; min-height: 1.2em; }

    .error-banner {
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .item-result { margin-bottom: 1.5rem; }

    .item-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .item-title { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 9999px;
      white-space: nowrap;
    }
    .badge-source { background: #1e3a5f; color: #7dd3fc; }
    .badge-cached { background: #1c3327; color: #6ee7b7; }
    .badge-error  { background: #2d1a1a; color: #fca5a5; }

    .copy-btn {
      margin-top: 0;
      padding: 0.3rem 0.75rem;
      font-size: 0.78rem;
      background: #2d3148;
      margin-left: auto;
    }
    .copy-btn:hover:not(:disabled) { background: #3d4168; }

    .item-error {
      color: #fca5a5;
      font-size: 0.88rem;
      background: #2d1a1a;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
    }

    .conditions-grid { display: flex; flex-direction: column; gap: 0.6rem; }

    .condition-card {
      border-radius: 8px;
      border: 1px solid;
      padding: 0.75rem 1rem;
    }
    .condition-card.graded  { background: #1c1a0e; border-color: #713f12; }
    .condition-card.sealed  { background: #0f1c13; border-color: #14532d; }
    .condition-card.cib     { background: #0d1529; border-color: #1e3a5f; }
    .condition-card.boxdisc { background: #1a1229; border-color: #3b1f5e; }
    .condition-card.loose   { background: #171717; border-color: #292929; }

    .condition-name {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .condition-card.graded  .condition-name { color: #fbbf24; }
    .condition-card.sealed  .condition-name { color: #4ade80; }
    .condition-card.cib     .condition-name { color: #60a5fa; }
    .condition-card.boxdisc .condition-name { color: #c084fc; }
    .condition-card.loose   .condition-name { color: #94a3b8; }

    .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: baseline; }

    .stat { display: flex; flex-direction: column; }
    .stat-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }
    .stat-value.avg { font-size: 1.35rem; }

    .count-note { font-size: 0.75rem; color: #475569; margin-top: 0.4rem; }

    /* Low-data fallback table */
    .recent-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-top: 0.25rem;
    }
    .recent-table th {
      text-align: left;
      color: #475569;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.25rem 0;
      border-bottom: 1px solid #2d3148;
    }
    .recent-table td {
      padding: 0.3rem 0;
      border-bottom: 1px solid #1e2130;
      color: #cbd5e1;
      vertical-align: top;
    }
    .recent-table td:last-child { text-align: right; white-space: nowrap; padding-left: 0.5rem; }
    .recent-table a { color: #818cf8; text-decoration: none; }
    .recent-table a:hover { text-decoration: underline; }
    .low-data-note { font-size: 0.75rem; color: #64748b; margin-bottom: 0.4rem; font-style: italic; }
    .data-quality-note { font-size: 0.7rem; color: #f59e0b; margin-top: 0.4rem; font-style: italic; }

    #results { margin-top: 0; }

    /* Summary card */
    .summary-card { margin-bottom: 1.5rem; }
    .summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .summary-title { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .condition-picker { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .cond-pill {
      padding: 0.25rem 0.65rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #2d3148;
      background: #0f1117;
      color: #64748b;
      transition: all 0.15s;
    }
    .cond-pill:hover { border-color: #475569; color: #94a3b8; }
    .cond-pill.active { background: #6366f1; border-color: #6366f1; color: #fff; }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .summary-table th {
      text-align: left;
      color: #475569;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.3rem 0.5rem;
      border-bottom: 1px solid #2d3148;
    }
    .summary-table th:last-child { text-align: right; }
    .summary-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid #1a1f2e;
      color: #cbd5e1;
    }
    .summary-table td:last-child { text-align: right; font-weight: 600; color: #f1f5f9; }
    .summary-table td.no-data { color: #334155; font-style: italic; }
    .summary-table tr.total-row td {
      border-top: 1px solid #2d3148;
      border-bottom: none;
      padding-top: 0.6rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .summary-table tr.total-row td:last-child { font-size: 1.1rem; color: #a5b4fc; }

    /* Sales drawer (expand/collapse) */
    .toggle-sales-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .toggle-sales-btn:hover { color: #94a3b8; }
    .toggle-sales-btn .chevron { display: inline-block; transition: transform 0.2s; }
    .toggle-sales-btn.open .chevron { transform: rotate(90deg); }

    /* Specified condition highlight */
    .condition-card.specified { outline: 2px solid #6366f1; outline-offset: 2px; }
    .your-item-badge {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .other-conditions-toggle {
      background: none;
      border: none;
      color: #475569;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0.4rem 0;
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .other-conditions-toggle:hover { color: #94a3b8; }
    .other-conditions { display: none; margin-top: 0.5rem; }
    .other-conditions.open { display: flex; flex-direction: column; gap: 0.6rem; }

    .sales-drawer {
      display: none;
      margin-top: 0.6rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 0.6rem;
    }
    .sales-drawer.open { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Price Checker</h1>
    <p class="subtitle">Video game resale prices from eBay sold listings</p>

    <div class="card">
      <label for="items">Items to look up <span style="color:#475569">(one per line)</span></label>
      <textarea id="items" rows="5" placeholder="Super Mario 64 N64&#10;Legend of Zelda SNES&#10;Nintendo 64 Console"></textarea>

      <div class="row">
        <div>
          <label for="excluded">Excluded keywords <span style="color:#475569">(comma-separated)</span></label>
          <input type="text" id="excluded" value="lot, bundle, repair, broken, parts, for parts" />
        </div>
        <div>
          <label for="category">eBay Category ID <span style="color:#475569">(optional)</span></label>
          <input type="text" id="category" placeholder="e.g. 139973" />
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="outliers" checked />
        <label for="outliers">Remove outliers</label>
      </div>

      <button id="submit-btn" onclick="checkPrices()">Check Prices</button>
      <div id="status"></div>
    </div>

    <div id="results"></div>
  </div>

  <script>
    const CONDITION_CLASS = {
      'Sealed + Graded': 'graded',
      'Sealed': 'sealed',
      'CIB': 'cib',
      'Box + Disc': 'boxdisc',
      'Loose': 'loose',
    };

    function fmt(val) {
      if (val == null) return '—';
      return '$' + val.toFixed(2);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderSalesTable(sales) {
      let rows = '';
      for (const s of sales) {
        const title = s.url
          ? `<a href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(s.title.slice(0, 70))}${s.title.length > 70 ? '…' : ''}</a>`
          : escHtml(s.title.slice(0, 70)) + (s.title.length > 70 ? '…' : '');
        rows += `<tr><td>${title}</td><td>${s.sale_date}</td><td>${fmt(s.price)}</td></tr>`;
      }
      return `<table class="recent-table"><thead><tr><th>Title</th><th>Date</th><th>Price</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    const CONDITIONS = ['Sealed + Graded', 'Sealed', 'CIB', 'Box + Disc', 'Loose'];
    let _summaryData = null;
    let _activeCondition = 'Loose';

    function getPriceForCondition(item, condition) {
      const c = item.conditions.find(c => c.condition === condition);
      if (!c) return null;
      // Use average if available, otherwise average of recent_sales
      if (c.average_price != null) return c.average_price;
      if (c.recent_sales && c.recent_sales.length > 0) {
        const sum = c.recent_sales.reduce((a, s) => a + s.price, 0);
        return sum / c.recent_sales.length;
      }
      return null;
    }

    function bestCondition(results) {
      // If most items have a specified condition, use the most common one
      const specCounts = {};
      for (const r of results) {
        if (r.specified_condition) {
          specCounts[r.specified_condition] = (specCounts[r.specified_condition] || 0) + 1;
        }
      }
      if (Object.keys(specCounts).length > 0) {
        return Object.entries(specCounts).sort((a, b) => b[1] - a[1])[0][0];
      }
      // Fallback: pick the condition with the most items that have price data
      let best = 'Loose';
      let bestCount = -1;
      for (const cond of CONDITIONS) {
        const count = results.filter(r => getPriceForCondition(r, cond) != null).length;
        if (count > bestCount) { bestCount = count; best = cond; }
      }
      return best;
    }

    function getPriceForItem(item, activeCondition) {
      // Use the item's specified condition if the active condition matches, otherwise use active
      const condToUse = item.specified_condition || activeCondition;
      return getPriceForCondition(item, condToUse === activeCondition ? activeCondition : condToUse)
          ?? getPriceForCondition(item, activeCondition);
    }

    function renderSummary(results, activeCondition) {
      // Only show summary if more than 1 item or any item has data
      const itemsWithData = results.filter(r => !r.error && r.conditions.length > 0);
      if (itemsWithData.length === 0) return '';

      // Which conditions appear across all results?
      const presentConditions = CONDITIONS.filter(cond =>
        results.some(r => r.conditions.find(c => c.condition === cond))
      );

      const pills = presentConditions.map(cond => {
        const active = cond === activeCondition ? ' active' : '';
        return `<button class="cond-pill${active}" onclick="selectCondition('${escHtml(cond)}')">${escHtml(cond)}</button>`;
      }).join('');

      let rows = '';
      let total = 0;
      let totalMissing = false;

      for (const item of results) {
        if (item.error) {
          rows += `<tr><td>${escHtml(item.query)}</td><td class="no-data" colspan="1">error</td></tr>`;
          totalMissing = true;
          continue;
        }
        const price = getPriceForItem(item, activeCondition);
        if (price != null) {
          total += price;
          rows += `<tr><td>${escHtml(item.query)}</td><td>${fmt(price)}</td></tr>`;
        } else {
          rows += `<tr><td>${escHtml(item.query)}</td><td class="no-data">no data</td></tr>`;
          totalMissing = true;
        }
      }

      const totalLabel = totalMissing ? `${fmt(total)} <span style="color:#475569;font-size:0.8rem">(partial)</span>` : fmt(total);

      return `<div class="card summary-card">
        <div class="summary-header">
          <span class="summary-title">Total Value</span>
          <div class="condition-picker">${pills}</div>
        </div>
        <table class="summary-table">
          <thead><tr><th>Item</th><th style="text-align:right">${escHtml(activeCondition)} Avg</th></tr></thead>
          <tbody>
            ${rows}
            <tr class="total-row"><td>Total</td><td>${totalLabel}</td></tr>
          </tbody>
        </table>
      </div>`;
    }

    function selectCondition(condition) {
      _activeCondition = condition;
      if (_summaryData) {
        const summaryEl = document.getElementById('summary');
        if (summaryEl) summaryEl.outerHTML = `<div id="summary">${renderSummary(_summaryData, _activeCondition)}</div>`;
      }
    }

    function toggleSales(btn) {
      btn.classList.toggle('open');
      const drawer = btn.nextElementSibling;
      drawer.classList.toggle('open');
      const count = btn.dataset.count;
      btn.querySelector('.label').textContent = drawer.classList.contains('open')
        ? `Hide ${count} sale${count != 1 ? 's' : ''}`
        : `Show ${count} sale${count != 1 ? 's' : ''}`;
    }

    function toggleOtherConditions(btn) {
      btn.classList.toggle('open');
      const panel = btn.nextElementSibling;
      panel.classList.toggle('open');
      btn.textContent = panel.classList.contains('open') ? '▲ Hide other conditions' : '▼ Show other conditions';
    }

    function renderCondition(c, isSpecified = false) {
      const cls = CONDITION_CLASS[c.condition] || 'loose';
      const specifiedCls = isSpecified ? ' specified' : '';
      const badge = isSpecified ? '<span class="your-item-badge">your item</span>' : '';
      let body = '';

      if (c.recent_sales && c.recent_sales.length > 0) {
        // Low-data: sales table is shown inline (no toggle needed)
        body += `<p class="low-data-note">Only ${c.count} sale${c.count !== 1 ? 's' : ''} — showing most recent</p>`;
        body += renderSalesTable(c.recent_sales);
      } else {
        // Aggregated stats
        body += `<div class="stats-row">
          <div class="stat"><span class="stat-label">Avg</span><span class="stat-value avg">${fmt(c.average_price)}</span></div>
          <div class="stat"><span class="stat-label">Median</span><span class="stat-value">${fmt(c.median_price)}</span></div>
          <div class="stat"><span class="stat-label">Low</span><span class="stat-value">${fmt(c.min_price)}</span></div>
          <div class="stat"><span class="stat-label">High</span><span class="stat-value">${fmt(c.max_price)}</span></div>
        </div>
        <div class="count-note">${c.count} sold listing${c.count !== 1 ? 's' : ''}</div>`;
        if (c.data_note) {
          body += `<p class="data-quality-note">⚠ ${escHtml(c.data_note)}</p>`;
        }
      }

      // Expandable sales drawer — shown for all conditions that have sales data
      const allSales = c.sales || [];
      let drawerHtml = '';
      if (allSales.length > 0) {
        const label = `Show ${allSales.length} sale${allSales.length !== 1 ? 's' : ''}`;
        drawerHtml = `
          <button class="toggle-sales-btn" data-count="${allSales.length}" onclick="toggleSales(this)">
            <span class="chevron">▶</span><span class="label">${label}</span>
          </button>
          <div class="sales-drawer">${renderSalesTable(allSales)}</div>`;
      }

      return `<div class="condition-card ${cls}${specifiedCls}">
        <div class="condition-name">${escHtml(c.condition)}${badge}</div>
        ${body}
        ${drawerHtml}
      </div>`;
    }

    function itemToText(item) {
      const lines = [`=== ${item.query} ===`];
      if (item.error) {
        lines.push(`Error: ${item.error}`);
      } else {
        for (const c of item.conditions) {
          if (c.average_price != null) {
            lines.push(`${c.condition}: avg $${c.average_price.toFixed(2)}, median $${c.median_price.toFixed(2)} (${c.count} sales)`);
          } else if (c.recent_sales) {
            const prices = c.recent_sales.map(s => `$${s.price.toFixed(2)}`).join(', ');
            lines.push(`${c.condition}: ${prices} (${c.count} recent sale${c.count !== 1 ? 's' : ''})`);
          }
        }
      }
      return lines.join('\n');
    }

    function renderItem(item) {
      const badges = [];
      badges.push(`<span class="badge badge-source">${escHtml(item.source)} · ${item.total_results_fetched} results</span>`);
      if (item.cached) {
        const ts = item.cached_at ? new Date(item.cached_at).toLocaleString() : '';
        badges.push(`<span class="badge badge-cached">cached ${ts}</span>`);
      }
      if (item.error) {
        badges.push(`<span class="badge badge-error">error</span>`);
      }

      const copyId = 'copy-' + Math.random().toString(36).slice(2);

      let conditionsHtml = '';
      if (item.error) {
        conditionsHtml = `<div class="item-error">${escHtml(item.error)}</div>`;
      } else if (item.conditions.length === 0) {
        conditionsHtml = `<div class="item-error">No sales data found for this item.</div>`;
      } else if (item.specified_condition) {
        const specified = item.conditions.filter(c => c.condition === item.specified_condition);
        const others = item.conditions.filter(c => c.condition !== item.specified_condition);
        const specifiedHtml = specified.map(c => renderCondition(c, true)).join('');
        const othersHtml = others.length > 0
          ? `<button class="other-conditions-toggle" onclick="toggleOtherConditions(this)">▼ Show other conditions</button>
             <div class="other-conditions">${others.map(c => renderCondition(c, false)).join('')}</div>`
          : '';
        conditionsHtml = `<div class="conditions-grid">${specifiedHtml}${othersHtml}</div>`;
      } else {
        conditionsHtml = `<div class="conditions-grid">${item.conditions.map(c => renderCondition(c, false)).join('')}</div>`;
      }

      return `<div class="item-result card">
        <div class="item-header">
          <span class="item-title">${escHtml(item.query)}</span>
          ${badges.join('')}
          <button class="copy-btn" id="${copyId}" onclick="copyItem(this, ${JSON.stringify(itemToText(item))})">Copy</button>
        </div>
        ${conditionsHtml}
      </div>`;
    }

    function copyItem(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    async function checkPrices() {
      const itemsRaw = document.getElementById('items').value;
      const lines = itemsRaw.split('\n').map(s => s.trim()).filter(Boolean);
      if (lines.length === 0) return;

      const excludedRaw = document.getElementById('excluded').value;
      const excluded = excludedRaw.split(',').map(s => s.trim()).filter(Boolean);
      const removeOutliers = document.getElementById('outliers').checked;
      const categoryId = document.getElementById('category').value.trim() || null;

      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      const results = document.getElementById('results');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Fetching…';
      status.textContent = `Looking up ${lines.length} item${lines.length !== 1 ? 's' : ''}…`;
      results.innerHTML = '';

      try {
        const resp = await fetch('/api/prices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: lines,
            excluded_keywords: excluded,
            remove_outliers: removeOutliers,
            category_id: categoryId,
          }),
        });

        if (!resp.ok) {
          const text = await resp.text();
          results.innerHTML = `<div class="error-banner">Server error ${resp.status}: ${escHtml(text)}</div>`;
          return;
        }

        const data = await resp.json();
        _summaryData = data.results;
        _activeCondition = bestCondition(data.results);
        const summaryHtml = renderSummary(data.results, _activeCondition);
        results.innerHTML = `<div id="summary">${summaryHtml}</div>` + data.results.map(renderItem).join('');
        status.textContent = `Done — ${data.results.length} result${data.results.length !== 1 ? 's' : ''} · ${new Date(data.requested_at).toLocaleTimeString()}`;
      } catch (err) {
        results.innerHTML = `<div class="error-banner">Network error: ${escHtml(err.message)}</div>`;
        status.textContent = '';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Prices';
      }
    }

    // Submit on Ctrl+Enter / Cmd+Enter in the textarea
    document.getElementById('items').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) checkPrices();
    });
  </script>
</body>
</html>
